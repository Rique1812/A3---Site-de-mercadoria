<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TechStore</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="CSS/style.css">

</head>

<body>

    <div class="container py-4">

        <h1 class="text-center mb-4">
            Mercado Fresh
        </h1>

        <!-- Barra de pesquisa abaixo com um input para rodar, id importante -->
        
        <input
            type="text"
            id="busca"
            class="form-control mb-4"
            placeholder="Buscar produto..."
        >

        <h2>Produtos</h2>

        <div id="produtos" class="row g-4">

        </div>

        <hr>

        <h2 class="section-favoritos">⭐ Favoritos</h2>

        <div id="favoritos" class="bg-section">
            <div id="favoritos-row" class="row g-4"></div>
        </div>

        <hr>

        <h2 class="section-carrinho">🛒 Carrinho</h2>

        <div id="carrinho" class="bg-section">
            <div id="carrinho-row" class="row g-4"></div>
        </div>

        <div id="total" class="mt-3 fw-bold">

        </div>

        <button
            class="btn btn-success mt-3"
            onclick="finalizarCompra()"
        >
            Finalizar Compra
        </button>

    </div>

    <script src="JS/main.js"></script>

</body>

</html>
